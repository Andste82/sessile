name: CI

on:
  push:
    branches: [master]
  pull_request:

permissions:
  contents: read

jobs:
  backend:
    name: Backend (vet + test)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: backend/go.mod
          cache-dependency-path: backend/go.sum

      - name: go vet
        working-directory: backend
        run: go vet ./...

      - name: go test
        working-directory: backend
        run: go test ./...

  frontend:
    name: Frontend (build + test)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Build (type-check + bundle)
        working-directory: frontend
        run: npm run build

      - name: Test
        working-directory: frontend
        run: npm run test

  docker:
    name: Docker (build + smoke test)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      # Single-arch here: this job is about catching a broken image on the PR,
      # not producing artifacts. The release workflow does the multi-arch push.
      - name: Build image
        uses: docker/build-push-action@v6
        with:
          context: .
          load: true
          tags: sessile:dev
          build-args: VERSION=ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Smoke test
        run: scripts/smoke-docker.sh sessile:dev

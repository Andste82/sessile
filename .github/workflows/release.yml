name: Release

# Tag a commit on master and push the tag:
#   git tag v0.2.0 && git push origin v0.2.0
# Everything below derives from that tag — no workflow ever commits to master.
on:
  push:
    tags: ["v*"]

permissions:
  contents: write # create the GitHub release + upload assets
  packages: write # push the image to GHCR

env:
  REGISTRY: ghcr.io

jobs:
  # The tag is the single source of truth for the version: v0.2.0 -> 0.2.0.
  # Every job below stamps this same value, so binary, image tag and release
  # name can never drift apart.
  version:
    name: Resolve version
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.v.outputs.version }}
    steps:
      - uses: actions/checkout@v4

      - id: v
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      # Gate: refuse to release if the tag disagrees with the declared version,
      # or if a placeholder got a hardcoded version baked back into it. Runs
      # before any build, so a drifted tag costs seconds, not a bad release.
      - name: Version gate
        run: scripts/check-version.sh "${{ steps.v.outputs.version }}"

      - name: Reject tags that already exist as a release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          code=$(curl -sS -o /dev/null -w '%{http_code}' \
            -H "Authorization: Bearer $GH_TOKEN" \
            "https://api.github.com/repos/${GITHUB_REPOSITORY}/releases/tags/${GITHUB_REF_NAME}")
          if [ "$code" = "200" ]; then
            echo "::error::a release for ${GITHUB_REF_NAME} already exists — delete it first or bump the version"
            exit 1
          fi

  binaries:
    name: Binary (${{ matrix.goos }}/${{ matrix.goarch }})
    needs: version
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: linux
            goarch: amd64
          - goos: linux
            goarch: arm64
          - goos: darwin
            goarch: amd64
          - goos: darwin
            goarch: arm64
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - uses: actions/setup-go@v5
        with:
          go-version-file: backend/go.mod
          cache-dependency-path: backend/go.sum

      # Builds the SPA and copies it into backend/web/dist for the go:embed.
      - name: Build frontend
        run: |
          cd frontend && npm ci
          cd .. && make build-frontend

      # backend/web/dist ships a committed placeholder so go:embed compiles in a
      # bare checkout. That means a skipped SPA build yields a binary that builds
      # fine and then serves "Frontend not built" — fail loudly instead.
      - name: Assert SPA was embedded
        run: |
          test -d backend/web/dist/assets \
            || { echo "::error::backend/web/dist has no assets — placeholder would be embedded"; exit 1; }
          grep -q '<div id="app"' backend/web/dist/index.html \
            || { echo "::error::backend/web/dist/index.html is still the placeholder"; exit 1; }

      - name: Build binary
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          VERSION: ${{ needs.version.outputs.version }}
        run: |
          make build-backend
          mv bin/sessile "bin/sessile_${VERSION}_${GOOS}_${GOARCH}"

      - uses: actions/upload-artifact@v4
        with:
          name: sessile-${{ matrix.goos }}-${{ matrix.goarch }}
          path: bin/sessile_*
          if-no-files-found: error

  image:
    name: Image ${{ matrix.variant }} (multi-arch -> GHCR)
    needs: version
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          # alpine is the default variant and takes the unsuffixed tags.
          - variant: alpine
            target: runtime-alpine
            suffix: ""
          # ubuntu is for sessions running glibc-linked programs.
          - variant: ubuntu
            target: runtime-ubuntu
            suffix: "-ubuntu"
    steps:
      - uses: actions/checkout@v4

      # arm64 is emulated on the amd64 runner; only the Go/npm compile steps
      # run under it, so the cost is tolerable.
      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Lowercases the owner: GHCR rejects uppercase in image paths, and the
      # GitHub user here is "Andste82".
      - id: repo
        run: echo "image=${REGISTRY}/${GITHUB_REPOSITORY,,}" >> "$GITHUB_OUTPUT"

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          target: ${{ matrix.target }}
          platforms: linux/amd64,linux/arm64
          push: true
          build-args: VERSION=${{ needs.version.outputs.version }}
          tags: |
            ${{ steps.repo.outputs.image }}:${{ needs.version.outputs.version }}${{ matrix.suffix }}
            ${{ steps.repo.outputs.image }}:latest${{ matrix.suffix }}
          # Separate scopes: one cache shared by both variants would thrash,
          # since they only have the builder stages in common.
          cache-from: type=gha,scope=${{ matrix.variant }}
          cache-to: type=gha,mode=max,scope=${{ matrix.variant }}

  # Pull the just-pushed image back down and exercise it, so a broken release
  # is caught before the GitHub release goes out.
  verify-image:
    name: Verify pushed ${{ matrix.variant }} image
    needs: [version, image]
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - variant: alpine
            suffix: ""
          - variant: ubuntu
            suffix: "-ubuntu"
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - id: repo
        run: echo "image=${REGISTRY}/${GITHUB_REPOSITORY,,}" >> "$GITHUB_OUTPUT"

      - name: Smoke test linux/amd64
        run: |
          IMAGE="${{ steps.repo.outputs.image }}:${{ needs.version.outputs.version }}${{ matrix.suffix }}"
          docker pull "$IMAGE"
          scripts/smoke-docker.sh "$IMAGE"

      # The variants exist to differ in userland; assert they actually do,
      # rather than trusting that --target picked the right base.
      - name: Assert the variant is what it claims
        run: |
          IMAGE="${{ steps.repo.outputs.image }}:${{ needs.version.outputs.version }}${{ matrix.suffix }}"
          got=$(docker run --rm --entrypoint sh "$IMAGE" -c '. /etc/os-release; echo $ID')
          if [ "$got" != "${{ matrix.variant }}" ]; then
            echo "::error::${{ matrix.variant }} image reports os-release ID '$got'"
            exit 1
          fi
          echo "$IMAGE is $got"

  release:
    name: Publish GitHub release
    needs: [version, binaries, verify-image]
    runs-on: ubuntu-latest
    steps:
      # pattern is required: build-push-action also uploads a "*.dockerbuild"
      # build record, and pulling that one in fails the download step.
      - uses: actions/download-artifact@v4
        with:
          path: dist
          pattern: sessile-*
          merge-multiple: true

      - name: Checksums
        working-directory: dist
        run: sha256sum sessile_* > checksums.txt

      - id: repo
        run: echo "image=${REGISTRY}/${GITHUB_REPOSITORY,,}" >> "$GITHUB_OUTPUT"

      - uses: softprops/action-gh-release@v2
        with:
          name: sessile ${{ needs.version.outputs.version }}
          generate_release_notes: true
          files: dist/*
          body: |
            ### Container

            ```
            docker pull ${{ steps.repo.outputs.image }}:${{ needs.version.outputs.version }}
            docker run -p 8080:8080 -v "$PWD/workspace:/workspace" \
              ${{ steps.repo.outputs.image }}:${{ needs.version.outputs.version }}
            ```

            ### Binaries

            Static, no runtime dependencies. Verify with `checksums.txt`.

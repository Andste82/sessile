services:
  sessile:
    build:
      context: .
      args:
        # Local builds are "dev"; override with VERSION=0.2.0 docker compose up.
        VERSION: ${VERSION:-dev}
    image: sessile:${VERSION:-dev}
    container_name: sessile
    ports:
      - "8080:8080"
    volumes:
      # Mount the directory tree sessions may open shells in.
      - ./workspace:/workspace
      # Persist session metadata across restarts.
      - sessile-config:/config
    restart: unless-stopped

volumes:
  sessile-config:
